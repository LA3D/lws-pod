# Fork pod (L1+L2+L3, --lws) behind a TLS-terminating Caddy proxy — the end-to-end rig for the
# request.protocol / X-Forwarded-Proto scheme fix, and a rehearsal of the public Caddy rung.
#
#   make cert                                                  # mkcert ./certs for pod.vardeman.me
#   docker compose -f docker-compose.fork-tls.yml up -d --build
#   curl --cacert certs/rootCA.pem https://pod.vardeman.me/.well-known/lws-storage
#       -> id/serviceEndpoint MUST be https://pod.vardeman.me/...  (proves the fix)
#   docker compose -f docker-compose.fork-tls.yml down -v
#
# Own project name so it NEVER reconciles against the `lws-pod` project's `jss` service
# (the committed lws-pod-local pod) — they share this directory and both name a `jss` service.
name: lws-pod-forktls
services:
  jss:
    build:
      context: .
      dockerfile: Dockerfile.fork
      args:
        # default JSS_GIT_REF is pinned in Dockerfile.fork (PROF/conneg closeout round); override here if needed.
        JSS_GIT_REF: "${JSS_GIT_REF:-c0bc445ac9bc30b85c35863071822825f91f1e2e}"
    image: lws-pod:fork-conformance
    container_name: lws-pod-fork
    # Same flags as the Dockerfile's default CMD, plus --idp-issuer to advertise the public
    # Caddy-fronted issuer (S2, zero fork code), and --lws-config pointing at the pod
    # resource that declares the server-level LWS service pointers as data
    # ({ profileIndex, void, uriSpaces }) — replaces the old --lws-profile-index/--lws-void
    # path flags outright (spec 2026-07-11 §4, no deprecation aliases). Multi-tenant round
    # (A3/A5-C2): this flag drives ONLY the LEGACY server-scoped podConfig (the
    # /.well-known/void aggregate, transitionally = alice's void); the PER-STORAGE config is
    # read at the FIXED convention `<storageRoot>profiles/pod-config.jsonld` (server.js
    # PER_STORAGE_CONFIG_REL), INDEPENDENT of this flag — so bob resolves his own config
    # regardless. Keep this ABSOLUTE (a relative value would break the legacy void lookup).
    # Read lazily + mtime-cached: absent before publish = services off (no crash), no restart.
    # mashlib-cdn dropped (navigator round): server-side HTML views replace the CDN mashlib UI.
    command: ["jss", "start", "-p", "3000", "-h", "0.0.0.0", "-r", "/data",
      "--idp", "--mcp", "--conneg", "--git", "--notifications", "--provision-keys",
      "--idp-issuer", "https://pod.vardeman.me",
      "--lws", "--lws-config", "/alice/profiles/pod-config.jsonld"]
    # http only — NOT published to the host; reachable solely via Caddy on the compose network.
    expose:
      - "3000"
    volumes:
      - pod-data-fork:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2
    container_name: lws-pod-caddy
    depends_on:
      - jss
    ports:
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
    restart: unless-stopped

volumes:
  pod-data-fork:
